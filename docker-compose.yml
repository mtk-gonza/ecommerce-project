services:
  ecom-backend:
    build:
      context: ./ecommerce-fastapi
    container_name: ecommerce-fastapi
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
      - DEBUG=${DEBUG}
    ports:
      - ${API_PORT}:3050
    restart: always

  ecommerce-react:
    build:
      context: ./ecommerce-react
    container_name: ecommerce-react
    environment:
      - API_URL=${API_URL}
    ports:
      - ${WEB_PORT}:80
    depends_on:
      - ecommerce-fastapi
    restart: always
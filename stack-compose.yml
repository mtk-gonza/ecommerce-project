services:
  ecommerce-fastapi:
    image: ecommerce-project-ecommerce-fastapi:latest
    container_name: ecommerce-fastapi
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
      - DEBUG=${DEBUG}
    ports:
      - ${API_PORT}:3050
    restart: always

  ecommerce-react:
    image: ecommerce-project-ecommerce-react:latest
    container_name: ecommerce-react
    environment:
      - API_URL=${API_URL}
    ports:
      - ${WEB_PORT}:80
    depends_on:
      - ecommerce-fastapi
    restart: always